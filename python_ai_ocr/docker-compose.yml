version: '3.8'

services:
  ocr-service:
    build: .
    container_name: scales-ai-ocr
    ports:
      - "8100:8100"
    environment:
      - APP_NAME=SCALES AI OCR Service
      - APP_VERSION=1.0.0
      - DEBUG=False
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=8100
      - OCR_ENGINE=paddleocr
      - OCR_CONFIDENCE_THRESHOLD=0.5
      - OCR_MAX_RESPONSE_TIME_MS=300
      - MAX_IMAGE_SIZE_MB=10
      - IMAGE_RESIZE_WIDTH=1280
      - IMAGE_RESIZE_HEIGHT=720
      - ENABLE_COMPANY_VALIDATION=True
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - scales-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  scales-network:
    driver: bridge
